<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sequence Predictor | LSTM</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #818cf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.25rem;
            color: var(--text);
            font-size: 1.1rem;
            font-family: inherit;
            resize: none;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 1.25rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 2.5rem;
            padding: 1.5rem;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            border: 1px dashed var(--accent);
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .prediction {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Decorative blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(192, 132, 252, 0.15));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .blob-1 { top: -100px; right: -100px; }
        .blob-2 { bottom: -100px; left: -100px; }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(129, 140, 248, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="card">
            <h1>AI Sequence Predictor</h1>
            <p class="subtitle">Next Word Prediction using LSTM</p>
            
            <div class="badge-container">
                <span class="badge">PyTorch</span>
                <span class="badge">FastAPI</span>
                <span class="badge">Wikipedia API</span>
                <span class="badge">News Data</span>
            </div>
            
            <div class="input-group">
                <textarea id="inputText" rows="3" placeholder="Type something... (e.g. Sherlock Holmes)"></textarea>
            </div>

            <button onclick="predictNextWord()">
                <span id="btnText">Predict Next Word</span>
                <div id="loader" class="loader"></div>
            </button>

            <div id="resultContainer" class="result">
                <div class="result-label">Predicted Next Word</div>
                <div id="predictionText" class="prediction"></div>
            </div>
        </div>
    </div>

    <script>
        async function predictNextWord() {
            const input = document.getElementById('inputText').value;
            const resultContainer = document.getElementById('resultContainer');
            const predictionText = document.getElementById('predictionText');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (!input.trim()) return;

            // UI Feedback
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: input }),
                });

                const data = await response.json();
                
                predictionText.innerText = data.predicted_word;
                resultContainer.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to get prediction. Make sure the server is running.');
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
